<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARTINX Laboratory</title>
    <link rel="icon" type="image/png" href="../../assets/ARTINX-Calculate-Lab/WhiteLogo.png" />
    <link rel="stylesheet" href="ARTINX-Calculate-Lab.css" />
</head>

<body>
    <view id="app" class="page-shell theme-dark">
        <view class="page-backdrop-art">
            <video id="backdropVideo" class="page-backdrop-art-image" autoplay muted loop playsinline preload="auto"
                src="../../Dark1mp4"></video>
            <view class="page-backdrop-art-blend"></view>
        </view>
        <view class="page-backdrop-art-grid"></view>
        <view class="page-backdrop-shade"></view>
        <view id="pageFrost" class="page-content-frost page-content-frost-dark"></view>
        <view class="page-grid"></view>
        <view class="page-glow glow-left"></view>
        <view class="page-glow glow-right"></view>
        <view class="page-glow glow-bottom"></view>
        <view class="page-orbit orbit-one"></view>
        <view class="page-orbit orbit-two"></view>
        <view id="floatingStageTitle" class="floating-stage-title">
            <view class="floating-stage-panel">
                <text class="floating-stage-copy">大&nbsp;道&nbsp;至&nbsp;简&nbsp;&nbsp;匠&nbsp;心&nbsp;至&nbsp;臻</text>
                <view id="floatingThemeSwitch" class="theme-switch floating-theme-switch" data-action="toggle-theme">霓虹
                </view>
            </view>
        </view>
        <view id="appContent" class="page-content"></view>
    </view>

    <script src="lib/damage-lab-core.js"></script>
    <script src="lib/damage-lab-chart.js"></script>
    <script src="ARTINX-Calculate-Lab.js"></script>
</body>

</html>
